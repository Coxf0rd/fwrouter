# fwrouter config

# ---- devices discovery (read-only) ----
# If unset, backend will auto-detect by reading dnsmasq configs + checking standard paths.

# Explicit lease file path (dnsmasq "dhcp-leasefile="), read-only:
# dnsmasq_leasefile=/var/lib/misc/dnsmasq.leases

# Explicit dnsmasq config dir (where dhcp-host reservations live), read-only:
# dnsmasq_conf_dir=/etc/dnsmasq.d

# Explicit dnsmasq main config file, read-only:
# dnsmasq_conf_file=/etc/dnsmasq.conf
enabled=true
mode=SELECTIVE
selective_default=VPN
tailscale_policy_mode=EXIT_ONLY
