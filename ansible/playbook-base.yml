---
- name: Install base gateway stack (fwrouter + mihomo2 glue)
  hosts: all
  become: true
  vars:
    repo_root: "{{ playbook_dir }}/.."
    fwrouter_src: "{{ repo_root }}/fwrouter-stack"
    fwrouter_install_examples: true
  tasks:
    - name: Install required packages (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        name:
          - ca-certificates
          - curl
          - openssl
          - socat
          - dnsmasq
          - iptables
          - ipset
          - netfilter-persistent
          - python3
          - dnsutils
          - docker.io
          - docker-compose-plugin
        state: present

    - name: Enable docker
      ansible.builtin.systemd:
        name: docker.service
        enabled: true
        state: started

    - name: Enable dnsmasq
      ansible.builtin.systemd:
        name: dnsmasq.service
        enabled: true
        state: started

    - name: Enable netfilter-persistent
      ansible.builtin.systemd:
        name: netfilter-persistent.service
        enabled: true
        state: started
      ignore_errors: true

    - name: Detect default route interface (WAN)
      ansible.builtin.shell: "ip route show default 2>/dev/null | awk '{print $5; exit}'"
      register: wan_if_detect
      changed_when: false

    - name: Detect first private IPv4 interface (LAN)
      ansible.builtin.shell: |
        ip -4 -o addr show scope global 2>/dev/null \
          | awk '{print $2, $4}' \
          | sed 's#/.*##' \
          | awk '$1 !~ /^(lo|docker0|tailscale0)$/ && $1 !~ /^(br-|veth)/ {print $0}' \
          | awk '
            function is_priv(ip) {
              split(ip, a, "."); if (length(a) != 4) return 0;
              if (a[1]==10) return 1;
              if (a[1]==192 && a[2]==168) return 1;
              if (a[1]==172 && a[2]>=16 && a[2]<=31) return 1;
              return 0;
            }
            { if (is_priv($2)) { print $1; exit } }
          '
      register: lan_if_detect
      changed_when: false

    - name: Detect LAN IPv4 address
      ansible.builtin.shell: "ip -4 -o addr show dev \"{{ lan_if_detect.stdout | default('') }}\" 2>/dev/null | awk '{print $4}' | cut -d/ -f1 | head -n1"
      register: lan_ip_detect
      changed_when: false
      when: (lan_if_detect.stdout | default('')) | length > 0

    - name: Ensure directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/fwrouter
        - /etc/fwrouter/mihomo2
        - /etc/systemd/system
        - /etc/systemd/system/dnsmasq.service.d
        - /etc/systemd/system/netfilter-persistent.service.d
        - /usr/local/sbin
        - /app/scripts
        - /app/fwrouter

    - name: Install fwrouter host scripts (/usr/local/sbin)
      ansible.builtin.copy:
        src: "{{ fwrouter_src }}/host-sbin/"
        dest: "/usr/local/sbin/"
        mode: "0755"

    - name: Install /app/scripts helpers (used by timers)
      ansible.builtin.copy:
        src: "{{ fwrouter_src }}/host-scripts/"
        dest: "/app/scripts/"
        mode: "0755"

    - name: Install systemd units and drop-ins
      ansible.builtin.copy:
        src: "{{ fwrouter_src }}/host-systemd/"
        dest: "/etc/systemd/system/"
        mode: "0644"

    - name: Install fwrouter docker stack into /app/fwrouter
      ansible.builtin.copy:
        src: "{{ fwrouter_src }}/fwrouter/"
        dest: "/app/fwrouter/"

    - name: Install /etc/fwrouter examples (non-destructive)
      when: fwrouter_install_examples | bool
      block:
        - name: Create /etc/fwrouter/router.conf if missing (auto-detected defaults)
          ansible.builtin.copy:
            dest: /etc/fwrouter/router.conf
            mode: "0644"
            force: false
            content: |
              # auto-generated defaults (edit if needed)
              lan_if={{ lan_if_detect.stdout | default('enp2s0') }}
              wan_if={{ wan_if_detect.stdout | default('enp1s0') }}
              tailscale_if=tailscale0
              tailscale_cidr=100.64.0.0/10
              redir_port=7892
              api_port=9092

        - name: Create /etc/fwrouter/local.conf if missing (auto-detected LAN IP)
          ansible.builtin.copy:
            dest: /etc/fwrouter/local.conf
            mode: "0644"
            force: false
            content: |
              domain=fwrouter.lan
              address={{ lan_ip_detect.stdout | default('192.168.0.1') }}

        - name: Copy example files if missing
          ansible.builtin.copy:
            src: "{{ fwrouter_src }}/host-etc-fwrouter/{{ item.src }}"
            dest: "/etc/fwrouter/{{ item.dest }}"
            mode: "0644"
            force: false
          loop:
            - { src: "fwrouter.conf", dest: "fwrouter.conf" }
            - { src: "devices.conf", dest: "devices.conf" }
            - { src: "policy.conf", dest: "policy.conf" }
            - { src: "rules.conf", dest: "rules.conf" }
            - { src: "doh.conf", dest: "doh.conf" }
            - { src: "autolist.json", dest: "autolist.json" }
            - { src: "mihomo2/config.yaml", dest: "mihomo2/config.yaml" }

    - name: Read existing /app/fwrouter/.env if present
      ansible.builtin.slurp:
        src: /app/fwrouter/.env
      register: fwrouter_env_existing
      ignore_errors: true

    - name: Decode /app/fwrouter/.env (if present)
      ansible.builtin.set_fact:
        fwrouter_env_text: "{{ (fwrouter_env_existing.content | default('') | b64decode) if (fwrouter_env_existing is defined and fwrouter_env_existing.content is defined) else '' }}"

    - name: Compute existing secrets from /app/fwrouter/.env
      ansible.builtin.set_fact:
        mihomo_api_secret_existing: "{{ (fwrouter_env_text | regex_search('(?m)^MIHOMO_API_SECRET=(.+)$', '\\\\1')) | default('') }}"
        postgres_password_existing: "{{ (fwrouter_env_text | regex_search('(?m)^POSTGRES_PASSWORD=(.+)$', '\\\\1')) | default('') }}"

    - name: Generate MIHOMO_API_SECRET if missing
      ansible.builtin.command: openssl rand -hex 16
      register: gen_mihomo_secret
      changed_when: false
      when: mihomo_api_secret_existing | length == 0

    - name: Generate POSTGRES_PASSWORD if missing
      ansible.builtin.command: openssl rand -hex 16
      register: gen_pg_password
      changed_when: false
      when: postgres_password_existing | length == 0

    - name: Choose secrets
      ansible.builtin.set_fact:
        mihomo_api_secret: "{{ mihomo_api_secret_existing if (mihomo_api_secret_existing | length > 0) else gen_mihomo_secret.stdout }}"
        postgres_password: "{{ postgres_password_existing if (postgres_password_existing | length > 0) else gen_pg_password.stdout }}"

    - name: Write /app/fwrouter/.env if missing
      ansible.builtin.copy:
        dest: /app/fwrouter/.env
        mode: "0600"
        force: false
        content: |
          POSTGRES_DB=fwrouter
          POSTGRES_USER=fwrouter
          POSTGRES_PASSWORD={{ postgres_password }}

          FWROUTER_ADMIN_PASSWORD=CHANGE_ME
          FWROUTER_BIND=0.0.0.0
          FWROUTER_PORT=9280

          MIHOMO_API_BASE=http://127.0.0.1:9191
          MIHOMO_API_SECRET={{ mihomo_api_secret }}
          MIHOMO_PROVIDER_NAME=subscription
          FWROUTER_TS_SUFFIX=.vpn.example.com
          FWR_MIHOMO_CONFIG=/etc/fwrouter/mihomo2/config.yaml

    - name: Ensure /app/fwrouter/.env contains FWR_MIHOMO_CONFIG for selected instance
      ansible.builtin.lineinfile:
        path: /app/fwrouter/.env
        regexp: '^FWR_MIHOMO_CONFIG='
        line: "FWR_MIHOMO_CONFIG=/etc/fwrouter/mihomo2/config.yaml"
        create: false

    - name: Ensure mihomo2 config secret matches MIHOMO_API_SECRET
      ansible.builtin.lineinfile:
        path: /etc/fwrouter/mihomo2/config.yaml
        regexp: '^secret:'
        line: "secret: {{ mihomo_api_secret }}"
      ignore_errors: true

    - name: systemd daemon-reload
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable core units (paths/timers)
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - fwrouter-apply.path
        - fwrouter-resolve-domains.timer
        - fwrouter-health-check.timer
        - fwrouter-vpn-mark-priority.timer
        - fwrouter-autolist-watchdog.timer
        - fwrouter-mihomo2-proxy.service
        - fwrouter-wan-route.service

    - name: Start fwrouter stack (db + api)
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: /app/fwrouter

    - name: Start mihomo2 (host network + TUN)
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.mihomo2.yml up -d --force-recreate
        chdir: /app/fwrouter

    - name: Apply fwrouter rules now (dnsmasq/ipset/iptables)
      ansible.builtin.command:
        cmd: /usr/local/sbin/fwrouter-apply --apply
      ignore_errors: true

    - name: Restart dnsmasq to pick up drop-ins (CAP_NET_ADMIN + ExecStartPre)
      ansible.builtin.systemd:
        name: dnsmasq.service
        state: restarted
      ignore_errors: true
