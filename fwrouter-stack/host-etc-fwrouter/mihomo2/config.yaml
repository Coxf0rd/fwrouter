mixed-port: 7895
redir-port: 7892
allow-lan: true
bind-address: 192.168.0.1
external-controller: 127.0.0.1:9191
secret: CHANGE_ME
mode: rule
log-level: warning
ipv6: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  proxy-server-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  direct-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

proxy-providers:
  subscription:
    type: http
    url: https://sub.example.com/REPLACE_ME
    interval: 3600
    path: /root/.config/mihomo/providers/subscription.yaml
    proxy: DIRECT
    header:
      User-Agent:
        - fwrouter/1.0
      X-HWID:
        - CHANGE_ME_MACHINE_ID
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: PROXY
    type: select
    proxies: null
    use:
      - subscription

rules:
  - MATCH,PROXY

profile:
  store-selected: true

tun:
  enable: true
  stack: system
  device: Mihomo
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
    - tcp://any:53
  iproute2-table-index: 2022
  iproute2-rule-index: 9000
