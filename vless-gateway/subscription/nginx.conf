map $arg_format $sub_target_by_format {
  default "";
  clash /sub-vpn.yaml;
  provider /sub-vpn-provider.yaml;
  uri /sub-vpn-uri-list.txt;
  b64 /sub-vpn64.txt;
}

map $http_user_agent $sub_target_by_ua {
  default /sub-vpn.yaml;
  ~*happ /sub-vpn64-happ.txt;
  ~*(clash|mihomo|meta|flclash) /sub-vpn.yaml;
}

map $sub_target_by_format $sub_target {
  default $sub_target_by_ua;
  ~^/ $sub_target_by_format;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  charset utf-8;

  location = /sub-vpn {
    add_header X-Subscription-Target $sub_target always;
    rewrite ^ $sub_target last;
  }

  location = /vpn-hub {
    rewrite ^ /sub-vpn64-happ.txt last;
  }

  location = /vpn-hub/ {
    rewrite ^ /sub-vpn64-happ.txt last;
  }

  location / {
    add_header Cache-Control "no-store, max-age=0" always;
    try_files $uri $uri/ =404;
  }
}
